<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #334155; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #6366f1; padding: 30px; border-radius: 12px 12px 0 0; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
        .content { background: #ffffff; padding: 30px; border: 1px solid #e2e8f0; border-radius: 0 0 12px 12px; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #94a3b8; }
        .btn { display: inline-block; background: #6366f1; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Task Completed! 🚀</h1>
    </div>
    <div class="content">
        <p>Hello,</p>
        <p>We're excited to let you know that a task has been marked as finished in your project <strong>{{ boardTitle }}</strong>.</p>
        <div style="background: #f8fafc; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #6366f1;">
            <p style="margin: 0; font-weight: 600; color: #1e293b;">{{ taskTitle }}</p>
        </div>
        <p>Keep up the great momentum!</p>
    </div>
    <div class="footer">
        <p>Sent via ArikaJS FlowBoard &bull; North Star Showcase</p>
    </div>
</body>
</html>
