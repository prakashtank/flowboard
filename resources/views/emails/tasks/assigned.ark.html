<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Task Assigned</title>
</head>
<body style="font-family: sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f7f6;">
    <div style="max-width: 600px; margin: 2rem auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h1 style="color: #6366f1; margin-top: 0;">New Task Assigned</h1>
        <p>Hello,</p>
        <p>You have been assigned to a new task on <strong>{{ board_title }}</strong>.</p>
        
        <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem; margin: 1.5rem 0;">
            <h3 style="margin: 0; font-size: 1.125rem; color: #1e293b;">{{ task_title }}</h3>
        </div>
        
        <p>Please log in to your dashboard to view the full details and start working.</p>
        
        <div style="text-align: center; margin-top: 2.5rem;">
            <a href="{{ config('app.url') }}/dashboard" style="background: #6366f1; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 12px; font-weight: 700;">View Task</a>
        </div>
        
        <p style="margin-top: 3rem; color: #64748b; font-size: 0.875rem;">
            Best regards,<br>
            The {{ app_name }} Team
        </p>
    </div>
    <div style="text-align: center; color: #94a3b8; font-size: 0.75rem; margin-bottom: 2rem;">
        &copy; {{ year }} {{ app_name }}. All rights reserved.
    </div>
</body>
</html>
